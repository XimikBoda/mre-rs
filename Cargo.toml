[package]
name = "mre-rs"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = [ "rlib" ]

[features]
default = []
eg = ["dep:embedded-graphics"]

[dependencies]
embedded-io = "0.7"
embedded-io-async = "0.7"
sjlj2 = "0.4.0"
embedded-graphics = { version = "0.8", default-features = false, optional = true }